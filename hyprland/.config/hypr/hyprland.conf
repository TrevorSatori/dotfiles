
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# PLEASE USE THE CONFIG PROVIDED IN THE GIT REPO /examples/hyprland.conf AND EDIT IT,
# OR EDIT THIS ONE ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################


# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hyprland.org/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hyprland.org/Configuring/Monitors/
#monitor=,preferred,auto,auto
monitor=eDP-2,2560x1600@30,0x0,1


###################
### MY PROGRAMS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = rofi -show drun
$terminalFileManager = yazi
$codeEditor = cursor
$browser = brave
$notes = obsidian
$powerMenu = zsh ~/.config/rofi/powermenu.sh
$themeSwitcher = zsh ~/.config/rofi/theme_switcher.sh

#################
### AUTOSTART ###
#################

# --- 1. Infrastructure (MUST BE FIRST) ---
# Core Wayland/Desktop environment variables for apps
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
# Required for the actual "Login" keyring to unlock (e.g. for Chrome/VS Code)
exec-once = gnome-keyring-daemon --start --components=secrets
# The UI popup that asks for your password
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- 2. Desktop Components ---
exec-once = waybar
exec-once = hypridle
exec-once = nm-applet 
exec-once = blueman-applet

# --- 3. Others ---
exec-once = awww-daemon 
exec-once = languagetool --http

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hyprland.org/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

cursor {
    inactive_timeout = 3 # Hides mouse
}


###################
### PERMISSIONS ###
###################

# See https://wiki.hyprland.org/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 5

    border_size = 2

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}


# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = 10
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true, glow
        range = 10
        render_power = 5
    }

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 15 # Range should be somewhere between 10 - 25
        passes = 3

        vibrancy = 0.1
	new_optimizations = true
	ignore_opacity = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true  # If true disables the random hyprland logo / anime girl background. :(
    disable_splash_rendering = true
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = true
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = ALT # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, Q, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, SPACE, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, swapsplit
bind = $mainMod SHIFT, T, exec, $themeSwitcher
bind = $mainMod SHIFT, R, exec, hyprctl reload && pkill waybar && hyprctl dispatch exec waybar
bind = $mainMod SHIFT, G, exec, hyprshade toggle grayscale

# Keyboard shortcuts (Program exec)
bind = $mainMod, C, exec, $codeEditor  # Code Editor (C)
bind = $mainMod SHIFT, E, exec, $fileManager # Explorer (E)
bind = $mainMod, E, exec, $terminal -e $terminalFileManager # Explorer (E)
bind = $mainMod, B, exec, $browser     # Browser (B)
bind = $mainMod, N, exec, $notes       # Notes (N)
bind = $mainMod, ESCAPE, exec, hyprlock
bind = $mainMod, S, exec, hyprshot -m region --freeze --clipboard-only # Screenshot to clipboard 
bind = $mainMod SHIFT, S, exec, hyprshot -m region --freeze -o ~/Media/Screenshots # Screenshot to file 
bind = $mainMod, Z, exec, $powerMenu

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# move active window
bind = $mainMod SHIFT, H, swapwindow, l
bind = $mainMod SHIFT, L, swapwindow, r
bind = $mainMod SHIFT, K, swapwindow, u
bind = $mainMod SHIFT, J, swapwindow, d


# Change tiling layout type
bind = $mainMod, F, fullscreen


# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, M, togglespecialworkspace, magic
bind = $mainMod SHIFT, M, movetoworkspace, special:magic


# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Example keybinds to resize the active window with arrow keys + SUPER + ALT
bind = $mainMod SHIFT CTRL, H, resizeactive, -20 0      # Decrease width
bind = $mainMod SHIFT CTRL, L, resizeactive, 20 0      # Increase width
bind = $mainMod SHIFT CTRL, K, resizeactive, 0 -20        # Decrease height
bind = $mainMod SHIFT CTRL, J, resizeactive, 0 20       # Increase height


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrul
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
# 1. Rules like 'suppress_event' and 'no_focus' now require a boolean value (on/off)
# Note: 'suppressevent' changed to 'suppress_event' (snake_case)
windowrule = suppress_event maximize, match:class .*

# 2. Boolean flags must be set to 'on' or 'true'
# Note: 'nofocus' changed to 'no_focus
# windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland 1, match:is_floating 1, match:fullscreen 0, match:pinned 0

# 3. Use 'match:' before every identifier like class, title, or initialClass
windowrule = workspace 1, match:class ^(brave-browser|firefox|zen)$

# 4. 'initialClass' changed to 'initial_class'
windowrule = workspace 2 silent, match:initial_class ^(cursor)$

# 5. Fixed remainder of rules with match: prefix
windowrule = workspace 3, match:class (?i)^(beekeeper-studio|DBeaver|hoppscotch-desktop)$
windowrule = workspace 4, match:class (?i)^(Spotify|vlc)$
windowrule = workspace 5, match:class (?i)^(thunar|obsidian|discord)$
windowrule = workspace 6, match:class (?i)^(zoom|Signal|Slack)$
windowrule = workspace 7, match:class (?i)^(com\.github\.johnfactotum\.Foliate|libreoffice-writer)$
windowrule = workspace 8, match:class (?i)^(com\.obsproject\.Studio)$
windowrule = workspace 9, match:class (?i)^(steam)$
windowrule = workspace 10, match:class ^(org\.getmonero\.monero-wallet-gui|cake_wallet|org\.keepassxc\.KeePassXC)$

# Set inactive opacity to 0.95 for specific windows only
windowrule = opacity 1.0 0.90, match:class ^(Alacritty|kitty)$

bind=,F3,exec,bash -c 'v=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print \$2}"); if (( $(echo "$v < 1.0" | bc -l) )); then wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+; fi'

bind = , F2, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%

bind = , F1, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

bind=,F5,exec,brightnessctl set 5%-

bind=,F6,exec,bash -c 'curr=$(brightnessctl get); max=$(brightnessctl max); if [ "$curr" -lt "$max" ]; then brightnessctl set +5%; fi'

# Dynamic visual settings (theme)
source = ~/.config/rices/current/hypr.conf
